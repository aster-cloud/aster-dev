name: Deploy to Cloudflare Workers

# 替换旧的 Cloudflare Pages 站（aster-lang-dev）。aster-dev 是 Next.js（含 SSR/
# middleware），经 OpenNext 适配部署到 Workers（与 aster-cloud 同款），自定义域名
# aster-lang.dev 在 wrangler.jsonc 的 routes 声明。
#
# 需要 repo secrets：CLOUDFLARE_API_TOKEN（含 Workers Scripts:Edit + Workers
# Routes:Edit）、CLOUDFLARE_ACCOUNT_ID。

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # 质量门：typecheck + lint + build 全过才部署。
      - run: pnpm typecheck
      - run: pnpm lint

      # OpenNext build + deploy 到 Workers。
      - name: Build & Deploy (OpenNext → Workers)
        run: pnpm exec opennextjs-cloudflare build && pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
