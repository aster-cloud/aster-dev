name: CI

# PR 质量门：typecheck + lint + test 在合并前跑。deploy.yml 只在 push 到 main 时
# 触发（部署前再跑一次同样的门），所以这里补一个 pull_request 触发，让坏示例在
# 合并前就被 src/content/cnl-examples.test.ts 拦截，而不是等到部署时。

on:
  pull_request:
    branches: [main]

# 同一 ref 上新 push 到来时取消尚在跑的过时 CI（PR 连续 push 常见）——省算力/排队。
# 该仓 CI 无发布/部署副作用（release 是独立 workflow），故可直接 cancel 过时 run。
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
